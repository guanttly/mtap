# MTAP Docker Compose 编排（开发/测试环境）
# 包含：api-server, ws-server, sync-worker, scheduler,
#       notify-worker, analyzer-worker, mysql, redis, kafka, zookeeper

version: "3.9"

# 公共环境变量
x-common-env: &common-env
  MTAP_CONFIG: /app/configs/config.prod.yaml
  MTAP_JWT_SECRET: ${MTAP_JWT_SECRET:-dev-secret-change-me}
  MTAP_DB_HOST: mysql
  MTAP_DB_PASS: ${MYSQL_PASSWORD:-mtap123}
  MTAP_REDIS_ADDR: redis:6379
  MTAP_KAFKA_BROKERS: kafka:9092

# 公共构建配置
x-build-base: &build-base
  context: ..
  dockerfile: deployments/Dockerfile

services:

  # ──────────────────── 业务服务 ────────────────────
  api-server:
    build:
      <<: *build-base
      args:
        BUILD_TARGET: api-server
    image: mtap/api-server:latest
    container_name: mtap-api
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    volumes:
      - api-logs:/var/log/mtap

  ws-server:
    build:
      <<: *build-base
      args:
        BUILD_TARGET: ws-server
    image: mtap/ws-server:latest
    container_name: mtap-ws
    ports:
      - "8081:8080"
    environment:
      <<: *common-env
      MTAP_PORT: 8081
    depends_on:
      - redis
    restart: unless-stopped

  scheduler:
    build:
      <<: *build-base
      args:
        BUILD_TARGET: scheduler
    image: mtap/scheduler:latest
    container_name: mtap-scheduler
    environment:
      <<: *common-env
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  sync-worker:
    build:
      <<: *build-base
      args:
        BUILD_TARGET: sync-worker
    image: mtap/sync-worker:latest
    container_name: mtap-sync
    environment:
      <<: *common-env
      MTAP_HIS_BASE_URL: ${HIS_BASE_URL:-}
      MTAP_HIS_KEY: ${HIS_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  notify-worker:
    build:
      <<: *build-base
      args:
        BUILD_TARGET: notify-worker
    image: mtap/notify-worker:latest
    container_name: mtap-notify
    environment:
      <<: *common-env
      MTAP_SMS_KEY: ${SMS_KEY:-}
      MTAP_SMS_SECRET: ${SMS_SECRET:-}
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  analyzer-worker:
    build:
      <<: *build-base
      args:
        BUILD_TARGET: analyzer-worker
    image: mtap/analyzer-worker:latest
    container_name: mtap-analyzer
    environment:
      <<: *common-env
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  # ──────────────────── 基础设施 ────────────────────
  mysql:
    image: mysql:8.0
    container_name: mtap-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: mtap
      MYSQL_USER: mtap
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mtap123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mtap", "-p${MYSQL_PASSWORD:-mtap123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mtap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mtap-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mtap-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  api-logs:
