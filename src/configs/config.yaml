# MTAP 开发环境配置
# 核心目的：本地开发专用，使用 SQLite + 本地服务
# 使用方式：MTAP_CONFIG=configs/config.yaml（默认）
# 注意：此文件可提交到 git，不应包含真实密钥

server:
  port: 8080
  mode: debug
  read_timeout: 30s
  write_timeout: 60s

# ─── 数据库（开发用 SQLite）────────────────────────────────────────────────────
database:
  driver: sqlite
  dsn: mtap_dev.db

# ─── Redis ──────────────────────────────────────────────────────────────────
redis:
  addr: localhost:6379
  password: ""
  db: 0
  pool_size: 10

# ─── Kafka ──────────────────────────────────────────────────────────────────
kafka:
  brokers:
    - localhost:9092
  group_id: mtap-dev
  num_partitions: 3

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt:
  secret: dev-secret-change-me-32-bytes!!
  access_expire: 2h
  refresh_expire: 168h

# ─── HIS 系统（本地 mock）────────────────────────────────────────────────────
his:
  base_url: http://localhost:8081/api
  api_key: dev-his-key
  timeout: 10s
  retry: 2

# ─── 收费系统（本地 mock）────────────────────────────────────────────────────
payment:
  base_url: http://localhost:8082/api
  api_key: dev-pay-key
  timeout: 5s

# ─── 消息平台（开发阶段仅打印日志）──────────────────────────────────────────
message:
  sms_provider: mock
  sms_key: ""
  sms_secret: ""
  sms_sign: MTAP诊疗预约
  wechat_app_id: ""
  wechat_token: ""

# ─── 日志 ────────────────────────────────────────────────────────────────────
log:
  level: debug
  audit_path: audit_dev.log
