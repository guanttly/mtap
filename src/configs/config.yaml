# MTAP 开发环境配置
# 核心目的：本地开发专用，使用 MySQL + 本地服务
# 使用方式：MTAP_CONFIG=configs/config.yaml（默认）
# 注意：此文件可提交到 git，不应包含真实密钥

server:
  port: 8080       # API HTTP 服务端口
  ws_port: 8081    # WebSocket 推送服务端口
  mode: debug
  read_timeout: 30s
  write_timeout: 60s

# ─── 数据库（开发用 MySQL）────────────────────────────────────────────────────
database:
  driver: mysql
  host: 192.168.40.206
  port: 3306
  name: jusha-software-euler-dev
  user: root
  password: jusha1996             # 本地开发密码，或通过环境变量 MTAP_DB_PASS 注入
  charset: utf8mb4
  parse_time: true
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 30m

# ─── Redis ──────────────────────────────────────────────────────────────────
redis:
  addr: 192.168.40.206:6379
  password: jusha1996
  db: 0
  pool_size: 10

# ─── Kafka ──────────────────────────────────────────────────────────────────
kafka:
  brokers:
    - localhost:9092
  group_id: mtap-dev
  num_partitions: 3

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt:
  secret: dev-secret-change-me-32-bytes!!
  access_expire: 2h
  refresh_expire: 168h

# ─── HIS 系统（本地 mock）────────────────────────────────────────────────────
his:
  base_url: http://localhost:8081/api
  api_key: dev-his-key
  timeout: 10s
  retry: 2

# ─── 收费系统（本地 mock）────────────────────────────────────────────────────
payment:
  base_url: http://localhost:8082/api
  api_key: dev-pay-key
  timeout: 5s

# ─── 消息平台（开发阶段仅打印日志）──────────────────────────────────────────
message:
  sms_provider: mock
  sms_key: ""
  sms_secret: ""
  sms_sign: MTAP诊疗预约
  wechat_app_id: ""
  wechat_token: ""

# ─── 日志 ────────────────────────────────────────────────────────────────────
log:
  level: debug
  audit_path: audit_dev.log
